<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ExpenseSnap - Personal Expense Logger</title>
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="style.css">
    <meta name="theme-color" content="#4a90e2">
</head>
<body>
    <header>
        <h1>ExpenseSnap</h1>
        <p>Track your spending, see charts, get monthly summaries</p>
    </header>

    <main>
        <div id="expense-form">
            <input type="number" id="amount" placeholder="Amount" step="0.01" min="0">
            <select id="category">
                <option value="">Select Category</option>
                <option value="food">Food & Dining</option>
                <option value="transport">Transportation</option>
                <option value="entertainment">Entertainment</option>
                <option value="shopping">Shopping</option>
                <option value="bills">Bills & Utilities</option>
                <option value="health">Health & Fitness</option>
                <option value="other">Other</option>
            </select>
            <input type="date" id="date">
            <button id="add-expense">Add Expense</button>
        </div>

        <div id="summary">
            <h2>Monthly Summary</h2>
            <div id="budget-section">
                <label for="budget-input">Monthly Budget: $</label>
                <input type="number" id="budget-input" step="0.01" min="0" placeholder="2000">
                <button id="set-budget">Set Budget</button>
            </div>
            <p id="total-spent">Total Spent: $0.00</p>
            <p id="budget-status">Budget Status: On Track</p>
        </div>

        <div id="chart-container">
            <h2>Spending by Category</h2>
            <canvas id="category-chart"></canvas>
        </div>

        <div id="expense-list">
            <h2>Recent Expenses</h2>
            <ul id="expenses"></ul>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="script.js"></script>
</body>
</html>
